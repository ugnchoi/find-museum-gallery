<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(210, 35%, 22%)"/>
      <stop offset="100%" stop-color="hsl(200, 30%, 14%)"/>
    </linearGradient>
  </defs>
  <!-- Background with gradient and inner border -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.4" stroke="hsl(200, 35%, 30%)" stroke-width="1.5"/>
  <!-- Roof line -->
  <path d="M6 11L16 5.5L26 11" stroke="hsl(38, 75%, 62%)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Columns (wider, more rounded) -->
  <rect x="8.25" y="12" width="2.5" height="9.5" rx="1" fill="hsl(38, 75%, 62%)"/>
  <rect x="14.75" y="12" width="2.5" height="9.5" rx="1" fill="hsl(38, 75%, 62%)"/>
  <rect x="21.25" y="12" width="2.5" height="9.5" rx="1" fill="hsl(38, 75%, 62%)"/>
  <!-- Base bar -->
  <rect x="5.5" y="22.5" width="21" height="2.25" rx="1" fill="hsl(38, 75%, 62%)"/>
</svg>
